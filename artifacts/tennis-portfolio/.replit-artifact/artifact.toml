kind = "web"
  previewPath = "/"
  title = "Victor Crosetto"
  version = "1.0.0"
  id = "artifacts/tennis-portfolio"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 24400

  [services.development]
  run = "pnpm --filter @workspace/tennis-portfolio run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/tennis-portfolio", "run", "build" ]
  publicDir = "artifacts/tennis-portfolio/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "24400"
  BASE_PATH = "/"
  